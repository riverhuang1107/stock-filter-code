name: Scheduled A-share screen

on:
  workflow_dispatch:
  schedule:
    # Daily 17:00 Asia/Shanghai = 09:00 UTC.
    - cron: "0 9 * * *"

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
      GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
      MPLCONFIGDIR: /tmp/stock-filter-matplotlib
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Print trigger time
        run: |
          echo "UTC time:"
          date -u
          echo "Asia/Shanghai time:"
          TZ=Asia/Shanghai date

      - name: Run screener and send email
        run: python -m stock_filter_tool run --top 10 --days 3 --chart-days 5 --send-email

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stock-filter-report
          path: reports/
          if-no-files-found: ignore
